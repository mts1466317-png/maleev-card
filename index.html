<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        /* 100dvh гарантированно фиксирует высоту на мобильных (убирает обрезку Safari) */
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Space Grotesk', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 0; }
        
        .scene {
            position: relative; z-index: 10; height: 100dvh; display: flex; 
            align-items: center; justify-content: center; perspective: 1000px;
            padding: 20px; box-sizing: border-box;
        }
        
        .card {
            width: 100%; max-width: 360px; padding: 36px 28px; border-radius: 24px;
            background: transparent;
            backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
            transform-style: preserve-3d; 
            will-change: transform;
            position: relative; overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
            50% { transform: translateY(-8px) rotateX(1deg) rotateY(-1deg); }
        }
        
        /* Блик, следующий за пальцем/мышью */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                        rgba(255, 255, 255, 0.04) 0%, transparent 50%);
            z-index: 1; pointer-events: none; border-radius: 24px;
            opacity: 0; transition: opacity 0.3s;
        }
        .card:hover::before, .card:active::before { opacity: 1; }
        
        .card-content { position: relative; z-index: 2; }
        
        .glow-text {
            background: linear-gradient(135deg, #00ff88 0%, #00d2ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.4));
        }
        
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px;
            text-decoration: none; transition: all 0.2s ease; position: relative; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            z-index: 20; cursor: pointer; touch-action: manipulation;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00d2ff 100%); color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }
        .btn-primary:active { transform: scale(0.97); }
        
        .btn-max {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%);
            color: #fff; border: none;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.35);
        }
        .btn-max:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(124, 58, 237, 0.45); }
        
        .btn-telegram {
            background: linear-gradient(135deg, #229ED9 0%, #0088cc 100%);
            color: #fff; border: none;
            box-shadow: 0 4px 15px rgba(34, 158, 217, 0.35);
        }
        .btn-telegram:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(34, 158, 217, 0.45); }
        
        .badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            background: rgba(0, 255, 136, 0.04); border: 1px solid rgba(0, 255, 136, 0.15);
            color: #00ff88; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 16px; font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="scene">
        <div class="card" id="tilt-card">
            <div class="card-content text-center">
                <div class="badge">Доступен для проектов</div>
                <h1 class="text-2xl font-bold text-white mb-1 tracking-tight leading-tight" style="text-shadow: 0 2px 10px rgba(0,0,0,0.8);">
                    МАЛЕЕВ<br>ЕГОР ОЛЕГОВИЧ
                </h1>
                <h2 class="text-base glow-text font-medium mb-5">АРХИТЕКТОР AI И IT-РЕШЕНИЙ</h2>
                
                <p class="text-gray-300 text-sm mb-8 leading-relaxed px-2" style="text-shadow: 0 1px 5px rgba(0,0,0,0.8);">
                    Реализую любой сложности IT и AI решения и автоматизации. Превращаю масштабные бизнес-задачи в элегантные, быстрые и технологичные продукты.
                </p>

                <div class="space-y-3">
                    <a href="tel:+79384386677" class="btn btn-primary">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"></path></svg>
                        +7 938 438-66-77
                    </a>
                    <a href="https://t.me/AngeleonOfficial" class="btn btn-telegram" target="_blank" rel="noopener noreferrer" data-app-link="tg://resolve?domain=AngeleonOfficial">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.941z"/></svg>
                        Telegram
                    </a>
                    <a href="https://max.ru/u/f9LHodD0cOLsJJa6h-Jbex9n8W8o0OKym6a-21NANod6FfRG7IoAYdvhX28" class="btn btn-max" target="_blank" rel="noopener noreferrer">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" fill="url(#max_grad)"/>
                            <path d="M8 8h2.5l1.5 3.5L13.5 8H16v8h-2.5v-4.5L12 15l-1.5-3.5V15H8V8z" fill="white"/>
                            <defs><linearGradient id="max_grad" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#0077FF"/><stop offset="1" stop-color="#7B2FFF"/></linearGradient></defs>
                        </svg>
                        MAX
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Интерактивный фон (мышь + гироскоп)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particlesCount = 700;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 15;
        }
        
        const particlesGeometry = new THREE.BufferGeometry();
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.025, color: 0x00ff88, transparent: true, opacity: 0.85
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        camera.position.z = 3;

        let mouseX = 0, mouseY = 0;
        let gyroX = 0, gyroY = 0;
        let targetGyroX = 0, targetGyroY = 0;
        let gyroActive = false;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth - 0.5) * 0.5;
            mouseY = (event.clientY / window.innerHeight - 0.5) * 0.5;
        });

        function onDeviceOrientation(event) {
            if (event.beta == null || event.gamma == null) return;
            targetGyroY = Math.max(-1, Math.min(1, event.gamma / 45));
            targetGyroX = Math.max(-1, Math.min(1, (event.beta - 45) / 45));
            gyroActive = true;
        }

        function enableGyroscope() {
            if (window._gyroEnabled) return;
            window._gyroEnabled = true;
            window.addEventListener('deviceorientation', onDeviceOrientation, true);
        }

        function requestGyroscopeAccess() {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => { if (state === 'granted') enableGyroscope(); })
                    .catch(() => {});
            } else {
                enableGyroscope();
            }
        }

        if (isMobile) {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.body.addEventListener('touchstart', requestGyroscopeAccess, { once: true, passive: true });
            } else {
                enableGyroscope();
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            gyroX += (targetGyroX - gyroX) * 0.08;
            gyroY += (targetGyroY - gyroY) * 0.08;

            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;
            particlesMesh.rotation.y += mouseX * 0.03 + gyroY * 0.06;
            particlesMesh.rotation.x += mouseY * 0.03 + gyroX * 0.06;

            if (gyroActive && isMobile) {
                camera.position.x += (gyroY * 0.15 - camera.position.x) * 0.05;
                camera.position.y += (-gyroX * 0.15 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
            }

            if (!isCardTouching && gyroActive && isMobile) applyGyroCardTilt();
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 2. Интерактив карточки (Tilt + Glare + гироскоп)
        const card = document.getElementById('tilt-card');
        let isCardTouching = false;

        function applyCardTilt(rotateX, rotateY, scale = 1.02) {
            card.style.animation = 'none';
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;
        }

        function applyGyroCardTilt() {
            if (isCardTouching || !gyroActive) return;
            const rotateX = -gyroX * 12;
            const rotateY = gyroY * 12;
            applyCardTilt(rotateX, rotateY, 1);
        }

        const handleMove = (e) => {
            if (e.target.closest('a')) return;
            isCardTouching = true;
            const rect = card.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -10;
            const rotateY = ((x - centerX) / centerX) * 10;
            
            applyCardTilt(rotateX, rotateY);
            card.style.setProperty('--mouse-x', `${(x / rect.width) * 100}%`);
            card.style.setProperty('--mouse-y', `${(y / rect.height) * 100}%`);
        };

        const handleLeave = () => {
            isCardTouching = false;
            if (gyroActive && isMobile) {
                applyGyroCardTilt();
            } else {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
                card.style.animation = 'float 6s ease-in-out infinite';
            }
        };

        card.addEventListener('mousemove', handleMove);
        card.addEventListener('mouseleave', handleLeave);

        // На мобильных tilt только через гироскоп — не перехватываем touch на кнопках
        if (!isMobile) {
            card.addEventListener('touchstart', handleMove, { passive: true });
            card.addEventListener('touchmove', handleMove, { passive: true });
            card.addEventListener('touchend', handleLeave);
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('touchend', (e) => e.stopPropagation(), { passive: true });
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const appLink = btn.dataset.appLink;
                if (appLink && isMobile) {
                    e.preventDefault();
                    window.location.href = appLink;
                    setTimeout(() => { window.location.href = btn.href; }, 600);
                }
            });
        });

        animate();
    </script>
</body>
</html>
